<div class="product-finder-step-markers">
    <button type="button" class="btn mr-2" :class="[{'btn-primary': stepNumber >=1 }]"><h6>{{ stepsLabels[0] }}</h6></button>
    <button type="button" class="btn mr-2" :class="[{'btn-primary': stepNumber >=2 }]"><h6>{{ stepsLabels[1] }}</h6></button>
    <button type="button" class="btn mr-2" :class="[{'btn-primary': stepNumber >=3 }]"><h6>{{ stepsLabels[2] }}</h6></button>
    <button type="button" class="btn mr-2" :class="[{'btn-primary': stepNumber >=4 }]"><h6>{{ stepsLabels[3] }}</h6></button>
</div>
<hr />
