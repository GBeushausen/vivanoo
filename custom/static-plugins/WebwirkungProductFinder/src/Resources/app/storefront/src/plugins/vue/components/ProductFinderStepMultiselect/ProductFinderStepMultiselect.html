<div class="product-finder-step-additional-selection row">

    <div class="col-12">
        <div class="row" v-if="stepLabel">
            <div class="step-label caption">{{ stepLabel }}</div>
        </div>
        <div class="row" v-if="stepQuestion">
            <div class="step-label"><h4>{{ stepQuestion }}</h4></div>
        </div>
        <div class="row" v-if="stepProperties.length>0">
            <div class="col-12 step-properties">
                <div v-for="stepProperty in stepProperties">
                    <h6>{{ stepProperty.name }}</h6>

                    <div class="col-12">
                        <button v-for="option in stepProperty.options"
                                type="button mr-2"
                                class="btn btn-property-option"
                                :class="getOptionClasses(option.id)"
                                @click="toggleOption(option.id)">
                            {{ option.name }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="product-finder-footer">
    <button class="btn btn-secondary" @click="onPreviousStepClicked" v-if="stepNumber >1">{{ previousStepLabel }}</button>
    <button class="btn btn-primary" @click="onNextStepClicked"
            :disabled="!selectedPropertyGroupOptionIds.length>0">{{ nextStepLabel }}
    </button>
</div>
