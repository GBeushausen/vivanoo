- pipeline: "Backup production DB"
  on: "CLICK"
  fail_on_prepare_env_warning: true
  actions:
  - action: "Dump with mysqldump"
    type: "SSH_COMMAND"
    login: "$main_SSH_USERNAME"
    host: "$main_SSH_SERVER"
    env_key: "secure!InSgrzEkRy94ku5VMU7cAA==.ZC+36kxwxbsoXx1hSN6pHw=="
    authentication_mode: "ENV_KEY"
    commands:
    - "# Download Script"
    - "cd /var/www/vhosts/$main_V_HOST"
    - "rm -f shopware6-database-dump.sh"
    - "rm -f dump.sql.gz "
    - ""
    - "wget https://raw.githubusercontent.com/Webwirkung/shopware6-database-dump/main/shopware6-database-dump.sh"
    - "chmod +x shopware6-database-dump.sh"
    - ""
    - "# Run script"
    - "./shopware6-database-dump.sh -d $main_DB_NAME -u $main_DB_USER -l \"$main_DB_PASSWD\" "
    - ""
  - action: "Download files from Host"
    type: "DOWNLOAD_SSH"
    source_path: "/var/www/vhosts/$main_V_HOST/dump.sql.gz"
    login: "$main_SSH_USERNAME"
    host: "$main_SSH_SERVER"
    env_key: "secure!InSgrzEkRy94ku5VMU7cAA==.ZC+36kxwxbsoXx1hSN6pHw=="
    authentication_mode: "ENV_KEY"
    overwrite: true
