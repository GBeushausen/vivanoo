- pipeline: "Deploy to production"
  events:
    - type: "PUSH"
      refs:
        - "refs/heads/main"
  fail_on_prepare_env_warning: true
  resources: "XLARGE"
  actions:
    - action: "Generate variables from integration"
      type: "INTEGRATION_VARIABLES"
      integration: "NYRomQjOy5eVoqROaEP4V27qrx"
    - action: "Vars to ENV file"
      type: "BUILD"
      working_directory: "/buddy/shopware6-demo"
      main_service_name: "Main"
      run_as_user: "root"
      docker_image_name: "dockware/flex"
      docker_image_tag: "2.0"
      execute_commands:
        - "cd /var/www/html"
        - "touch tmp.env"
        - "echo \"APP_ENV=prod\" >> tmp.env"
        - "echo \"APP_URL=$main_DOMAIN\" >> tmp.env"
        - "echo \"DATABASE_URL=\\\"mysql://$main_DB_USER:$main_DB_PASSWD@127.0.0.1:3306/$main_DB_NAME\\\"\" >> tmp.env"
        - ""
        - "echo \"SHOPWARE_CDN_STRATEGY_DEFAULT=id\" >> tmp.env"
        - ""
        - "echo \"AWS_CDN_DOMAIN=$AWS_CDN_DOMAIN\" >> tmp.env"
        - "echo \"AWS_BUCKET=$AWS_BUCKET\" >> tmp.env"
        - "echo \"AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID\" >> tmp.env"
        - "echo \"AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY\" >> tmp.env"
        - ""
        - "echo \"SHOPWARE_SKIP_WEBINSTALLER=1\" >> tmp.env"
        - "echo \"COMPOSER_PLUGIN_LOADER=1\" >> tmp.env"
        - ""
        - "echo \"JWT_PUBLIC_KEY=$JWT_PUBLIC_KEY\" >> tmp.env"
        - "echo \"JWT_PRIVATE_KEY=$JWT_PRIVATE_KEY\" >> tmp.env"
        - ""
        - "echo \"OPENSEARCH_URL=$OPENSEARCH_URL\" >> tmp.env"
        - "echo \"OPENSEARCH_BASIC_AUTH_ENABLED=$OPENSEARCH_BASIC_AUTH_ENABLED\" >> tmp.env"
        - "echo \"OPENSEARCH_BASIC_AUTH_USER=$OPENSEARCH_BASIC_AUTH_USER\" >> tmp.env"
        - "echo \"OPENSEARCH_BASIC_AUTH_PASSWORD='$OPENSEARCH_BASIC_AUTH_PASSWORD'\" >> tmp.env"
        - "echo \"SHOPWARE_ES_ENABLED=$SHOPWARE_ES_ENABLED\" >> tmp.env"
        - "echo \"SHOPWARE_ES_INDEX_PREFIX=$main_SHOPWARE_ES_INDEX_PREFIX\" >> tmp.env"
        - "echo \"SHOPWARE_ES_INDEXING_ENABLED=$SHOPWARE_ES_INDEXING_ENABLED\" >> tmp.env"
        - "echo \"SHOPWARE_ES_THROW_EXCEPTION=$SHOPWARE_ES_THROW_EXCEPTION\" >> tmp.env"
        - "echo \"ES_MULTILINGUAL_INDEX=1\" >> tmp.env"
        - ""
        - "echo \"ABACUS_LIVE_CLIENT_ID=$ABACUS_LIVE_CLIENT_ID\" >> tmp.env"
        - "echo \"ABACUS_LIVE_CLIENT_SECRET=$ABACUS_LIVE_CLIENT_SECRET\" >> tmp.env"
        - "echo \"ABACUS_TEST_CLIENT_ID=$ABACUS_TEST_CLIENT_ID\" >> tmp.env"
        - "echo \"ABACUS_TEST_CLIENT_SECRET=$ABACUS_TEST_CLIENT_SECRET\" >> tmp.env"
        - ""
        - "echo \"REDIS_HOST=$REDIS_HOST\" >> tmp.env"
        - "echo \"REDIS_PORT=$REDIS_PORT\" >> tmp.env"
        - "echo \"REDIS_PASSWORD=$REDIS_PASSWORD\" >> tmp.env"
        - "echo \"REDIS_DB_APP_CACHE=$main_REDIS_DB_APP_CACHE\" >> tmp.env"
        - "echo \"REDIS_DB_SESSION=$main_REDIS_DB_SESSION\" >> tmp.env"
        - ""
        - "echo \"MAIN_DOMAIN=$main_DOMAIN\" >> tmp.env"
        - "echo \"DEVELOP_DOMAIN=$develop_DOMAIN\" >> tmp.env"
        - ""
        - "echo \"LICENSE_DOMAIN=$main_LICENSE_DOMAIN\" >> tmp.env"
        - "echo \"SHOP_ID=$main_SHOP_ID\" >> tmp.env"
        - ""
        - "mv tmp.env .env.local"
        - "cat .env.local"
      volume_mappings:
        - "/:/var/www/html"
      shell: "BASH"
    - action: "Disable redis config"
      type: "BUILD"
      run_as_user: "root"
      docker_image_name: "dockware/flex"
      docker_image_tag: "2.0"
      execute_commands:
        - "cd /var/www/html/config/packages"
        - "mv redis.yaml redis.yaml.temp"
      volume_mappings:
        - "/:/var/www/html"
      shell: "BASH"
    - action: "Execute make prod"
      type: "BUILD"
      working_directory: "/buddy/shopware6-demo"
      main_service_name: "Main"
      run_as_user: "root"
      docker_image_name: "dockware/flex"
      docker_image_tag: "2.0"
      execute_commands:
        - "# Necessary until PHP 8.2 is the default in dockware:flex"
        - "cd /var/www"
        - "make switch-php version=8.2"
        - "nvm install 20.15.0"
        - "nvm use 20.15.0"
        - ""
        - "### end"
        - ""
        - "cd /var/www/html"
        - "npm install ts-node --save-dev"
        - "npm install ts-morph --save-dev"
        - "composer config bearer.packages.shopware.com ${main_TOKEN_SHOPWARE}"
        - "composer config github-oauth.github.com ${GITHUB_TOKEN}"
        - "composer install --no-scripts --no-dev"
        - "npm install --prefix ./vendor/shopware/administration/Resources/app/administration"
        - ""
        - "CI=1 SHOPWARE_SKIP_BUNDLE_DUMP=1 SHOPWARE_SKIP_THEME_COMPILE=1 bin/build-js.sh"
      volume_mappings:
        - "/:/var/www/html"
      shell: "BASH"
    - action: "Enable redis config again"
      type: "BUILD"
      run_as_user: "root"
      docker_image_name: "dockware/flex"
      docker_image_tag: "2.0"
      execute_commands:
        - "cd /var/www/html/config/packages"
        - "mv redis.yaml.temp redis.yaml"
      volume_mappings:
        - "/:/var/www/html"
      shell: "BASH"
    - action: "Wait for approval"
      type: "WAIT_FOR_APPLY"
      comment: "Push to server?"
    - action: "Rsync to Server"
      type: "RSYNC"
      local_path: "/"
      remote_path: "/var/www/vhosts/${main_V_HOST}/httpdocs"
      login: "$main_SSH_USERNAME"
      delete_extra_files: true
      host: "$main_SSH_SERVER"
      port: "22"
      env_key: "secure!InSgrzEkRy94ku5VMU7cAA==.ZC+36kxwxbsoXx1hSN6pHw=="
      authentication_mode: "ENV_KEY"
      archive: true
      compress: true
      deployment_excludes:
        - ".git"
        - "/public/media/"
        - "/public/sitemap/"
        - "/public/thumbnail/"
        - "/public/files/"
        - "/var/log/"
    - action: "SSH Post Deployment bin/console tasks"
      type: "SSH_COMMAND"
      commands:
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console database:migrate --all"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console cache:clear"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console plugin:refresh"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console plugin:update:all"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console cache:clear"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console cache:warmup"
        - "/var/www/vhosts/$main_V_HOST/.phpenv/shims/php /var/www/vhosts/$main_V_HOST/httpdocs/bin/console theme:compile"
      targets:
        - type: "SSH"
          id: "main_SSH_SERVER"
          host: "$main_SSH_SERVER"
          auth:
            method: "ASSETS_KEY"
            username: "$main_SSH_USERNAME"
            asset: "creoline"
