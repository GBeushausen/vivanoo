framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: 'doctrine://default?queue_name=async'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 5
            product_indexing:
                dsn: 'doctrine://default?queue_name=product_indexing'
                retry_strategy:
                    delay: 10000
            category_indexing:
                dsn: 'doctrine://default?queue_name=category_indexing'
                retry_strategy:
                    delay: 10000

            failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

        routing:
            # Route your messages to the transports
            # 'App\Message\YourMessage': async
            'WebwirkungAbacusIntegration\Messenger\Command\Shopper\ImportShoppers': async
            'WebwirkungAbacusIntegration\Messenger\Command\Shopper\SaveShoppers': async
            'WebwirkungAbacusIntegration\Messenger\Command\Product\ImportProducts': async
            'WebwirkungAbacusIntegration\Messenger\Command\Product\SaveProducts': async
            'Shopware\Core\Content\Product\DataAbstractionLayer\ProductIndexingMessage': product_indexing
            'Shopware\Core\Content\Category\DataAbstractionLayer\CategoryIndexingMessage': category_indexing
